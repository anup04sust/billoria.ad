# API Security Endpoints

billoria_core.api.csrf_token:
  path: "/api/v1/csrf-token"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\ApiSecurityController::getCsrfToken'
    _title: "Get CSRF Token"
  requirements:
    _access: "TRUE"
  methods: [GET]

# Billboard API Endpoints (Legacy)

billoria_core.billboard_search:
  path: "/api/billoria/billboards/search"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::search'
    _title: "Search Billboards"
  requirements:
    _permission: "access billoria api"
  methods: [GET]

billoria_core.billboard_availability:
  path: "/api/billoria/billboards/{billboard_id}/availability"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::checkAvailability'
    _title: "Check Billboard Availability"
  requirements:
    _permission: "access billoria api"
    billboard_id: \d+
  methods: [GET]

# Billboard CRUD API Endpoints (v1)

billoria_core.api.billboard_create:
  path: "/api/v1/billboard/create"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::createBillboard'
    _title: "Create Billboard"
  requirements:
    _permission: "create billboard content"
  methods: [POST]
  options:
    _auth: ["cookie", "basic_auth"]

billoria_core.api.billboard_list:
  path: "/api/v1/billboard/list"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::list'
    _title: "List Billboards"
  requirements:
    _access: "TRUE"
  methods: [GET]

billoria_core.api.billboard_read:
  path: "/api/v1/billboard/{billboard_id}"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::read'
    _title: "Get Billboard"
  requirements:
    _access: "TRUE"
    billboard_id: \d+
  methods: [GET]

billoria_core.api.billboard_read_uuid:
  path: "/api/v1/billboard/uuid/{uuid}"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::readByUuid'
    _title: "Get Billboard by UUID"
  requirements:
    _access: "TRUE"
    uuid: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
  methods: [GET]

billoria_core.api.billboard_update:
  path: "/api/v1/billboard/{billboard_id}"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::update'
    _title: "Update Billboard"
  requirements:
    _permission: "edit own billboard content"
    billboard_id: \d+
  methods: [PATCH, PUT]
  options:
    _auth: ["cookie", "basic_auth"]

billoria_core.api.billboard_delete:
  path: "/api/v1/billboard/{billboard_id}"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\BillboardApiController::delete'
    _title: "Delete Billboard"
  requirements:
    _permission: "delete own billboard content"
    billboard_id: \d+
  methods: [DELETE]
  options:
    _auth: ["cookie", "basic_auth"]

# AI API Endpoints (Ollama Integration)

# Admin Configuration

billoria_core.settings:
  path: "/admin/config/billoria/core"
  defaults:
    _form: '\Drupal\billoria_core\Form\BilloriaSettingsForm'
    _title: "Billoria Platform Settings"
  requirements:
    _permission: "administer site configuration"

billoria_core.api.ai_chat:
  path: "/api/v1/ai/chat"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\AiApiController::chat'
    _title: "AI Chat"
  requirements:
    _access: "TRUE"
  methods: [POST]

billoria_core.api.ai_billboard_description:
  path: "/api/v1/ai/billboard-description"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\AiApiController::generateBillboardDescription'
    _title: "Generate Billboard Description"
  requirements:
    _permission: "create billboard content"
  methods: [POST]
  options:
    _auth: ["cookie", "basic_auth"]

billoria_core.api.ai_enhance_search:
  path: "/api/v1/ai/enhance-search"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\AiApiController::enhanceSearch'
    _title: "Enhance Search Query"
  requirements:
    _access: "TRUE"
  methods: [POST]

billoria_core.api.ai_recommendations:
  path: "/api/v1/ai/recommendations"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\AiApiController::getRecommendations'
    _title: "Get AI Recommendations"
  requirements:
    _access: "TRUE"
  methods: [POST]

billoria_core.api.ai_status:
  path: "/api/v1/ai/status"
  defaults:
    _controller: '\Drupal\billoria_core\Controller\AiApiController::checkStatus'
    _title: "Check AI Service Status"
  requirements:
    _permission: "administer billoria"
  methods: [GET]
