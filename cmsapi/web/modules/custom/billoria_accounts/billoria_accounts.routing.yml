billoria_accounts.api.verification_status:
  path: '/api/v1/verification/status'
  defaults:
    _controller: '\Drupal\billoria_accounts\Controller\ApiVerificationController::getVerificationStatus'
  requirements:
    _user_is_logged_in: 'TRUE'
  methods: [GET]
  options:
    _auth: ['cookie']
