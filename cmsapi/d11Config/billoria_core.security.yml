enabled: true
csrf:
  enabled: true
  token_lifetime: 1800
  require_for_methods:
    - POST
    - PATCH
    - PUT
    - DELETE
  exclude_paths:
    - /api/v1/csrf-token
rate_limit:
  enabled: true
  bypass_ips:
    - 127.0.0.1
    - '::1'
  endpoints:
    api_register:
      limit: 5
      window: 3600
      identifier: ip+email
      pattern_check: true
    api_verify:
      limit: 10
      window: 3600
      identifier: ip
      pattern_check: false
    api_resend:
      limit: 3
      window: 3600
      identifier: ip+user
      pattern_check: false
    api_login:
      limit: 5
      window: 900
      identifier: ip
      pattern_check: true
    api_profile_update:
      limit: 30
      window: 3600
      identifier: user
      pattern_check: false
    api_notifications:
      limit: 300
      window: 3600
      identifier: user
      pattern_check: false
    api_default:
      limit: 60
      window: 3600
      identifier: ip
      pattern_check: false
pattern_detection:
  enabled: true
  sequential_emails:
    enabled: true
    threshold: 3
    window: 3600
    action: block
    block_duration: 86400
  fingerprint:
    enabled: true
    max_accounts_per_fingerprint: 5
    window: 86400
    require_header: X-Client-Fingerprint
  disposable_domains:
    enabled: true
    action: block
    domains:
      - tempmail.com
      - guerrillamail.com
      - 10minutemail.com
      - throwaway.email
      - mailinator.com
      - maildrop.cc
      - sharklasers.com
      - yopmail.com
      - temp-mail.org
      - getnada.com
      - trashmail.com
      - fakeinbox.com
      - emailondeck.com
      - tempinbox.com
      - guerrillamailblock.com
      - spam4.me
      - grr.la
      - mailnesia.com
      - mytemp.email
      - mohmal.com
  velocity:
    enabled: true
    max_registrations_per_minute: 1
    suspicious_velocity: 3
frontend:
  csrf_header: X-CSRF-Token
  csrf_field: csrf_token
  fingerprint_header: X-Client-Fingerprint
  include_rate_limit_headers: true
