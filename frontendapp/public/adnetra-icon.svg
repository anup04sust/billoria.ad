<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="adnGrad" x1="84" y1="84" x2="428" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#0F766E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#134E4A" stop-opacity="0.9"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="none"/>

  <!-- Eye shape as ellipse/circle (more square proportions) -->
  <ellipse cx="256" cy="256" rx="120" ry="60" fill="url(#eyeGrad)" stroke="#114643" stroke-width="12"/>

  <!-- Rectangular billboard (smaller, cornea-like, perspective with narrower left side) -->
  <path d="M 205 228 L 316 216 L 316 296 L 205 286 Z" fill="#E6FFFB" stroke="#134E4A" stroke-width="12" stroke-linejoin="round"/>
  <!-- Single vertical support (right side, reduced height) -->
  <line x1="286" y1="296" x2="286" y2="345" stroke="#134E4A" stroke-width="12" stroke-linecap="round"/>
  <!-- Base (extended to the left) -->
  <line x1="226" y1="345" x2="330" y2="345" stroke="#134E4A" stroke-width="12" stroke-linecap="round"/>

  <!-- Advertisement placeholder with perspective -->
  <g>
    <!-- Three lines (text placeholder) with more top space -->
    <rect x="213" y="250" width="42" height="4" rx="2" fill="#14B8A6" opacity="0.4" transform="skewY(-1)"/>
    <rect x="213" y="259" width="58" height="3" rx="1.5" fill="#0F766E" opacity="0.35" transform="skewY(-1)"/>
    <rect x="213" y="266" width="48" height="3" rx="1.5" fill="#14B8A6" opacity="0.35" transform="skewY(-1)"/>
    
    <!-- Lady/model silhouette (simplified) - right center, larger -->
    <g transform="translate(292, 242) skewY(-1)">
      <!-- Head -->
      <circle cx="0" cy="0" r="8" fill="#0F766E" opacity="0.5"/>
      <!-- Body (dress/torso shape) -->
      <path d="M -5 8 L -8 24 L 8 24 L 5 8 Z" fill="#0F766E" opacity="0.5"/>
    </g>
    
    <!-- Geometric shapes bottom right corner -->
    <g transform="translate(285, 275) skewY(-1)">
      <!-- Circle -->
      <circle cx="0" cy="0" r="6" fill="#14B8A6" opacity="0.4"/>
      <!-- Cube/square -->
      <rect x="10" y="-6" width="11" height="11" fill="#0F766E" opacity="0.4"/>
    </g>
  </g>
</svg>
