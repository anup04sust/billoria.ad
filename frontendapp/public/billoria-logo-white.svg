<svg xmlns="http://www.w3.org/2000/svg" width="370" height="60" viewBox="0 0 370 60" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&amp;display=swap');
    .logo-text {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 24px;
      fill: #FFFFFF;
      letter-spacing: 0.5px;
    }
    .logo-accent {
      fill: #FF6B6B;
    }
    .logo-tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 10px;
      fill: rgba(255,255,255,0.6);
      letter-spacing: 0.8px;
    }
  </style>

  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="100%" stop-color="#C1121F" />
    </linearGradient>
    <g id="mini-pin">
      <path d="M0,0 C-1.5,0 -2.5,1 -2.5,2.5 C-2.5,4.5 0,7.5 0,7.5 C0,7.5 2.5,4.5 2.5,2.5 C2.5,1 1.5,0 0,0 Z" fill="#FF6B6B" />
      <circle cx="0" cy="2.5" r="1" fill="#FFFFFF" />
    </g>
    <clipPath id="circleClip">
      <circle cx="30" cy="30" r="28" />
    </clipPath>
  </defs>

  <!-- Logo icon (unchanged) -->
  <g clip-path="url(#circleClip)">
    <circle cx="30" cy="30" r="28" fill="url(#sunGrad)" />
    <path d="M 0 38 L 0 15 L 8 15 L 8 22 L 15 22 L 15 15 L 24 15 L 24 38 Z" fill="#1D3557" />
    <path d="M 36 38 L 36 24 L 42 24 L 42 12 L 52 12 L 52 20 L 60 20 L 60 38 Z" fill="#1D3557" />
    <rect x="0" y="38" width="60" height="22" fill="#2b2d42" />
    <polygon points="12,60 48,60 32,38 28,38" fill="#4a4e69" />
    <line x1="30" y1="60" x2="30" y2="38" stroke="#f2e9e4" stroke-width="1.5" stroke-dasharray="4,3" />
    <line x1="22" y1="46" x2="22" y2="52" stroke="#8d99ae" stroke-width="1.5" />
    <polygon points="18,41 26,42.5 26,46.5 18,45" fill="#457B9D" />
    <polygon points="18.5,41.8 25.5,43.2 25.5,45.8 18.5,44.5" fill="#FFFFFF" />
    <line x1="41" y1="50" x2="41" y2="58" stroke="#8d99ae" stroke-width="1.5" />
    <polygon points="36,44 47,41 47,47 36,50" fill="#457B9D" />
    <polygon points="36.8,44.5 46.2,42.2 46.2,46.5 36.8,48.8" fill="#FFFFFF" />
    <rect x="9.5" y="17" width="4.5" height="3" fill="#FFFFFF" />
    <rect x="17" y="19" width="5" height="8" fill="#FFFFFF" />
    <rect x="37.5" y="26" width="3" height="6" fill="#FFFFFF" />
    <rect x="44" y="14" width="6" height="3.5" fill="#FFFFFF" />
  </g>

  <circle cx="30" cy="30" r="28" fill="none" stroke="#C1121F" stroke-width="2" stroke-opacity="0.2" />

  <!-- White text for dark backgrounds -->
  <text x="68" y="32" class="logo-text">BILLORIA <tspan class="logo-accent">ADPOINT</tspan></text>
  <text x="69" y="46" class="logo-tagline">DISCOVER</text>
  <use href="#mini-pin" x="133" y="39" />
  <text x="140" y="46" class="logo-tagline">COMPARE</text>
  <use href="#mini-pin" x="200" y="39" />
  <text x="208" y="46" class="logo-tagline">BOOK OUTDOOR</text>
</svg>
