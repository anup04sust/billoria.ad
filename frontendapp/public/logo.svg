<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="adnGrad" x1="60" y1="60" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="110" y1="120" x2="310" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="1200" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g filter="url(#softShadow)">
    <rect x="40" y="40" width="340" height="340" rx="84" fill="#F8FAFC"/>
  </g>

  <!-- Eye / location / billboard hybrid mark -->
  <g transform="translate(40 40)">
    <!-- outer eye -->
    <path d="M42 170C69 119 128 82 170 82C212 82 271 119 298 170C271 221 212 258 170 258C128 258 69 221 42 170Z" fill="url(#adnGrad)"/>

    <!-- billboard frame as iris -->
    <rect x="112" y="118" width="116" height="104" rx="20" fill="#E6FFFB" stroke="#134E4A" stroke-width="10"/>
    <line x1="170" y1="222" x2="170" y2="264" stroke="#134E4A" stroke-width="10" stroke-linecap="round"/>
    <line x1="138" y1="264" x2="202" y2="264" stroke="#134E4A" stroke-width="10" stroke-linecap="round"/>

    <!-- subtle grid to imply media inventory / map -->
    <g opacity="0.4" stroke="#0F766E" stroke-width="6" stroke-linecap="round">
      <line x1="140" y1="138" x2="140" y2="202"/>
      <line x1="170" y1="138" x2="170" y2="202"/>
      <line x1="200" y1="138" x2="200" y2="202"/>
      <line x1="128" y1="154" x2="212" y2="154"/>
      <line x1="128" y1="186" x2="212" y2="186"/>
    </g>

    <!-- A beam / focus point -->
    <path d="M170 104L193 150H147L170 104Z" fill="url(#glowGrad)"/>
    <circle cx="170" cy="170" r="18" fill="url(#glowGrad)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(430 0)">
    <text x="0" y="205" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="-2" fill="#0F172A">Ad<tspan fill="#0F766E">Netra</tspan></text>
    <text x="4" y="262" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="5" fill="#475569">VISION FOR SMART OUTDOOR MEDIA</text>
  </g>
</svg>
