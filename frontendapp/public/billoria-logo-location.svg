<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60" fill="none">
  <!-- Left bracket -->
  <path d="M 10 10 L 10 50 M 10 10 L 15 10 M 10 50 L 15 50" 
        stroke="#0066CC" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Right bracket -->
  <path d="M 52 10 L 52 50 M 52 10 L 47 10 M 52 50 L 47 50" 
        stroke="#0066CC" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Top mini brackets -->
  <path d="M 20 12 L 20 8 M 20 8 L 22 8" 
        stroke="#0066CC" 
        stroke-width="2" 
        stroke-linecap="round" 
        fill="none"/>
  <path d="M 42 12 L 42 8 M 42 8 L 40 8" 
        stroke="#0066CC" 
        stroke-width="2" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- Bottom mini brackets -->
  <path d="M 20 48 L 20 52 M 20 52 L 22 52" 
        stroke="#0066CC" 
        stroke-width="2" 
        stroke-linecap="round" 
        fill="none"/>
  <path d="M 42 48 L 42 52 M 42 52 L 40 52" 
        stroke="#0066CC" 
        stroke-width="2" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- Location pin icon -->
  <g transform="translate(31, 17)">
    <!-- Main pin shape (orange/red gradient) -->
    <defs>
      <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#FF6B35"/>
        <stop offset="100%" stop-color="#E8491C"/>
      </linearGradient>
    </defs>
    
    <!-- Pin body -->
    <path d="M 0 0 
             C -6 0, -10 4, -10 10
             C -10 16, 0 26, 0 26
             C 0 26, 10 16, 10 10
             C 10 4, 6 0, 0 0 Z" 
          fill="url(#pinGrad)"/>
    
    <!-- Inner circle -->
    <circle cx="0" cy="10" r="4" fill="white"/>
  </g>
  
  <!-- Text "Billoria" -->
  <text x="68" y="40" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="28" 
        font-weight="700" 
        fill="#ffffff">Billoria</text>
</svg>
