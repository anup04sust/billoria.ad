<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="adnGrad" x1="84" y1="84" x2="428" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="none"/>

  <!-- Narrower eye shape -->
  <path d="M68 256C108 205 184 172 256 172C328 172 404 205 444 256C404 307 328 340 256 340C184 340 108 307 68 256Z" fill="url(#adnGrad)"/>

  <!-- Rectangular billboard (smaller, cornea-like, perspective with narrower left side) -->
  <path d="M 196 226 L 316 216 L 316 296 L 196 286 Z" fill="#E6FFFB" stroke="#134E4A" stroke-width="12" stroke-linejoin="round"/>
  <!-- Single vertical support (right side, slightly shorter) -->
  <line x1="286" y1="296" x2="286" y2="360" stroke="#134E4A" stroke-width="12" stroke-linecap="round"/>
  <!-- Base (extended to the left) -->
  <line x1="226" y1="360" x2="330" y2="360" stroke="#134E4A" stroke-width="12" stroke-linecap="round"/>

  <!-- Advertisement placeholder with perspective -->
  <g>
    <!-- Three lines (text placeholder) with more top space -->
    <rect x="205" y="248" width="45" height="4" rx="2" fill="#14B8A6" opacity="0.4" transform="skewY(-1)"/>
    <rect x="205" y="257" width="62" height="3" rx="1.5" fill="#0F766E" opacity="0.35" transform="skewY(-1)"/>
    <rect x="205" y="264" width="52" height="3" rx="1.5" fill="#14B8A6" opacity="0.35" transform="skewY(-1)"/>
    
    <!-- Lady/model silhouette (simplified) - right center, larger -->
    <g transform="translate(292, 242) skewY(-1)">
      <!-- Head -->
      <circle cx="0" cy="0" r="8" fill="#0F766E" opacity="0.5"/>
      <!-- Body (dress/torso shape) -->
      <path d="M -5 8 L -8 24 L 8 24 L 5 8 Z" fill="#0F766E" opacity="0.5"/>
    </g>
    
    <!-- Geometric shapes bottom right corner -->
    <g transform="translate(285, 275) skewY(-1)">
      <!-- Circle -->
      <circle cx="0" cy="0" r="6" fill="#14B8A6" opacity="0.4"/>
      <!-- Cube/square -->
      <rect x="10" y="-6" width="11" height="11" fill="#0F766E" opacity="0.4"/>
    </g>
  </g>
</svg>
